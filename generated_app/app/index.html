<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hoboken Parking</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
    <!-- TODO before deploying: replace REPLACE_WITH_UMAMI_WEBSITE_ID and REPLACE_WITH_VERCEL_DOMAIN -->
    <script
      defer
      src="/um/script.js"
      data-website-id="REPLACE_WITH_UMAMI_WEBSITE_ID"
      data-domains="REPLACE_WITH_VERCEL_DOMAIN"
      data-auto-track="false"
    ></script>
  </head>
  <body>
    <div id="map"></div>
    <div id="banner"></div>
    <div id="sign-list"></div>
    <div id="locate-control">
      <button id="locate-btn" type="button" title="Get my current location" aria-label="Get my current location">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.8"/>
          <line x1="9" y1="1" x2="9" y2="5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="9" y1="13" x2="9" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="1" y1="9" x2="5" y2="9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="13" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div id="tow-legend">
      <button id="tow-toggle" aria-pressed="true" title="Show or hide tow zone markers">
        <span class="tow-dot"></span>
        <span class="tow-label">
          <span class="tow-title">Tow Zones</span>
          <span class="tow-status">Enabled</span>
        </span>
      </button>
    </div>
    <div id="upcoming-legend">
      <button id="upcoming-toggle" aria-pressed="true" title="Show or hide upcoming tow zone markers">
        <span class="upcoming-dot"></span>
        <span class="upcoming-label">
          <span class="upcoming-title">Upcoming</span>
          <span class="upcoming-status">Enabled</span>
        </span>
      </button>
    </div>
    <div id="violation-legend">
      <button id="violation-toggle" aria-pressed="true" title="Show or hide street violation highlights">
        <svg class="violation-road-icon" width="30" height="12" viewBox="0 0 30 12" aria-hidden="true">
          <rect class="violation-road-casing" width="30" height="12" rx="2" fill="#9ca3af"/>
          <rect class="violation-road-white" x="1.5" y="2.5" width="27" height="7" rx="1" fill="white"/>
          <rect class="violation-road-fill" x="1.5" y="2.5" width="27" height="7" rx="1" fill="#ef4444" fill-opacity="0.28"/>
        </svg>
        <span class="violation-label">
          <span class="violation-title">Street<br>Highlights</span>
          <span class="violation-status">Enabled</span>
        </span>
      </button>
    </div>
    <div id="garage-legend">
      <button id="garage-toggle" aria-pressed="true" title="Show or hide municipal garages">
        <span class="garage-dot"></span>
        <span class="garage-label">
          <span class="garage-title">Garages</span>
          <span class="garage-status">Enabled</span>
        </span>
      </button>
    </div>
    <div id="snow-legend">
      <button id="snow-toggle" aria-pressed="true" title="Show or hide snow emergency routes">
        <span class="snow-dot"></span>
        <span class="snow-label">
          <span class="snow-title">Snow Routes</span>
          <span class="snow-status">Enabled</span>
        </span>
      </button>
    </div>
    <div id="controls">
      <button id="here-btn">I'm Here Now</button>
      <button id="clear-btn">Clear My Spot</button>
    </div>
    <button id="feedback-btn" title="Send feedback" aria-label="Send feedback to developer">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect width="20" height="16" x="2" y="4" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
    </button>

    <div id="feedback-overlay" aria-hidden="true">
      <div id="feedback-modal" role="dialog" aria-modal="true" aria-labelledby="feedback-title">
        <h2 id="feedback-title">Send Feedback</h2>
        <p class="feedback-subtitle">Bugs, feature requests, or general comments welcome!</p>
        <textarea id="feedback-text" placeholder="Type your disappiontment here...I tried my best" rows="5"></textarea>
        <div class="feedback-actions">
          <button id="feedback-cancel">Cancel</button>
          <button id="feedback-submit">Submit</button>
        </div>
        <p id="feedback-confirm" aria-live="polite"></p>
      </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
